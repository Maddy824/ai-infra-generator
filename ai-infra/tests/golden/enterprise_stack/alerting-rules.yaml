# Prometheus alerting rules for enterprise-app
# Generated by ai-infra
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: enterprise-app-alerts
  labels:
    project: enterprise-app
spec:
  groups:
    - name: web.rules
      rules:
        - alert: web_HighCpuUsage
          expr: |
            rate(container_cpu_usage_seconds_total{container="web"}[5m]) * 100 > 80.0
          for: 5m
          labels:
            severity: warning
            service: web
          annotations:
            summary: "High CPU usage on web"
            description: "CPU usage is above 80.0% for more than 5 minutes."

        - alert: web_HighMemoryUsage
          expr: |
            container_memory_usage_bytes{container="web"} / container_spec_memory_limit_bytes{container="web"} * 100 > 85.0
          for: 5m
          labels:
            severity: warning
            service: web
          annotations:
            summary: "High memory usage on web"
            description: "Memory usage is above 85.0% for more than 5 minutes."

        - alert: web_HighErrorRate
          expr: |
            rate(http_requests_total{container="web", code=~"5.."}[5m])
            / rate(http_requests_total{container="web"}[5m]) * 100 > 5.0
          for: 5m
          labels:
            severity: critical
            service: web
          annotations:
            summary: "High 5xx error rate on web"
            description: "Error rate is above 5.0% for more than 5 minutes."

        - alert: web_HighLatency
          expr: |
            histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{container="web"}[5m])) * 1000 > 500.0
          for: 5m
          labels:
            severity: warning
            service: web
          annotations:
            summary: "High p99 latency on web"
            description: "p99 latency is above 500.0ms for more than 5 minutes."

        - alert: web_PodRestarts
          expr: |
            increase(kube_pod_container_status_restarts_total{container="web"}[1h]) > 3
          for: 10m
          labels:
            severity: warning
            service: web
          annotations:
            summary: "Frequent pod restarts for web"
            description: "Pod has restarted more than 3 times in the last hour."
