# GitLab CI/CD pipeline for enterprise-app
# Generated by ai-infra

stages:
  - lint
  - test
  - build
  - deploy

variables:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: enterprise-app

lint:
  stage: lint
  image: python:3.11-slim
  script:
    - echo "Add your lint command here"

test:
  stage: test
  image: python:3.11-slim
  script:
    - echo "Add your test command here"

build-web:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $REGISTRY/$IMAGE_PREFIX/web:$CI_COMMIT_SHA -f Dockerfile.web .
    - docker push $REGISTRY/$IMAGE_PREFIX/web:$CI_COMMIT_SHA

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl apply -f k8s/
  only:
    - main
  environment:
    name: production
