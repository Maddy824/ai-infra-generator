apiVersion: v1
kind: ResourceQuota
metadata:
  name: acme-quota
  namespace: acme
  labels:
    project: enterprise-app
    tenant: acme
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
